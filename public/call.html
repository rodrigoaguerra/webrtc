<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC · Socket.IO Signaling</title>
  <style>
    /* ── Reset & Tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --border:    #1e2a3a;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #facc15;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
      --font-body: "DM Sans", sans-serif;
      --radius:    10px;
    }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    /* ── Layout ── */
    .shell {
      width: 100%;
      max-width: 960px;
      display: grid;
      gap: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 1.4rem;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -.02em;
    }
    header p { font-size: .8rem; color: var(--muted); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .card-title {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Status ── */
    .status-row {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }

    .badge {
      display: flex; align-items: center; gap: .45rem;
      font-size: .78rem; font-weight: 500;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .3rem .8rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }
    .dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

    /* ── Controls ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: .75rem;
      align-items: end;
    }

    label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: .35rem; }

    input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .6rem .9rem;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      padding: .65rem 1.4rem;
      border: none; cursor: pointer;
      border-radius: 8px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: .85rem;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
    }
    .btn-danger  { background: var(--red);  color: #fff; }
    .btn-neutral { background: rgba(255,255,255,.08); color: var(--text); border: 1px solid var(--border); }

    .actions { display: flex; gap: .6rem; flex-wrap: wrap; }

    /* ── Videos ── */
    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .videos { grid-template-columns: 1fr; } }

    .video-wrap {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: #070b14;
      aspect-ratio: 16/9;
      border: 1px solid var(--border);
    }
    video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-label {
      position: absolute; bottom: .6rem; left: .75rem;
      font-size: .7rem; font-weight: 600;
      font-family: var(--font-mono);
      color: rgba(255,255,255,.7);
      background: rgba(0,0,0,.5);
      padding: .2rem .5rem;
      border-radius: 4px;
      backdrop-filter: blur(6px);
    }
    .video-placeholder {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      color: var(--muted); font-size: 2rem;
    }

    /* ── Log ── */
    .log {
      background: #070b14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      height: 180px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: .75rem;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .log-line { display: flex; gap: .6rem; }
    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-icon { flex-shrink: 0; }
    .log-msg  { color: var(--text); }
    .log-msg.success { color: var(--green); }
    .log-msg.error   { color: var(--red); }
    .log-msg.warn    { color: var(--yellow); }
    .log-msg.info    { color: var(--accent); }
  </style>
</head>
<body>

<div class="shell">

  <header>
    <div class="logo">📡</div>
    <div>
      <h1>WebRTC · Socket.IO Signaling</h1>
      <p>Node.js Socket.IO backend &nbsp;·&nbsp; Socket.IO frontend</p>
    </div>
  </header>

  <div class="card">
    <div class="card-title">Status</div>
    <div class="status-row">
      <div class="badge"><span class="dot" id="dot-ws"></span> WebSocket</div>
      <div class="badge"><span class="dot" id="dot-room"></span> Sala</div>
      <div class="badge"><span class="dot" id="dot-peer"></span> Peer</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Conexão</div>
    <div class="controls">
      <div>
        <label>Servidor Socket.IO</label>
        <input id="srv" value="https://webrtc-file-transfer-yt6p.onrender.com" />
      </div>
      <div>
        <label>Sala</label>
        <input id="room" value="sala-01" />
      </div>
      <button class="btn btn-primary" id="btn-connect">Conectar</button>
    </div>
    <div class="actions" style="margin-top:.9rem">
      <button class="btn btn-neutral" id="btn-camera"   disabled>📷 Câmera</button>
      <button class="btn btn-primary" id="btn-call"     disabled>📞 Ligar</button>
      <button class="btn btn-danger"  id="btn-hangup"   disabled>🔴 Desligar</button>
    </div>
  </div>

  <div class="videos">
    <div class="video-wrap">
      <div class="video-placeholder" id="ph-local">🎥</div>
      <video id="local-video" autoplay muted playsinline></video>
      <div class="video-label">Você</div>
    </div>
    <div class="video-wrap">
      <div class="video-placeholder" id="ph-remote">👤</div>
      <video id="remote-video" autoplay playsinline></video>
      <div class="video-label">Remoto</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Log</div>
    <div class="log" id="log"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
/* ── Helpers ── */
const $ = id => document.getElementById(id);
const now = () => new Date().toLocaleTimeString('pt-BR', { hour12: false });

function log(msg, type = '') {
  const line = document.createElement('div');
  line.className = 'log-line';
  const icons = { success:'✅', error:'❌', warn:'⚠️', info:'ℹ️' };
  line.innerHTML = `
    <span class="log-time">${now()}</span>
    <span class="log-icon">${icons[type] || '·'}</span>
    <span class="log-msg ${type}">${msg}</span>`;
  $('log').appendChild(line);
  $('log').scrollTop = 9999;
}

function setDot(id, state) {
  const d = $(`dot-${id}`);
  d.className = 'dot ' + state;
}

/* ── State ── */
let pc = null, localStream = null;
let currentRoom = '';
let socket = null;

/* ── ICE config ── */
const iceConfig = {
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
};

/* ── Sinalização genérica ── */
function send(event, payload = {}) {
  if (!socket || !socket.connected) return;
  socket.emit(event, payload);
}

function connect() {
  const url = $('srv').value.trim();
  currentRoom = $('room').value.trim();

  socket = io(url);

  setDot('ws', 'yellow');
  log(`Conectando em ${url}…`, 'info');

  socket.on('connect', () => {
    setDot('ws', 'green');
    log('Socket.IO conectado!', 'success');

    socket.emit('join-room', currentRoom);

    setDot('room', 'green');
    log(`Entrou na sala "${currentRoom}"`, 'success');

    $('btn-connect').disabled = true;
    $('btn-camera').disabled  = false;
  });

  // CORREÇÃO: O servidor envia diretamente a 'offer' crua, não um objeto empacotado
  socket.on('offer', async (offer) => {
    log('Offer recebida — respondendo…', 'info');

    try {
      await ensurePeerConnection();
      await pc.setRemoteDescription(new RTCSessionDescription(offer));

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      send('answer', {
        answer,
        room: currentRoom
      });
    } catch (err) {
      log(`Erro ao processar Offer: ${err.message}`, 'error');
    }
  });

  // CORREÇÃO: O servidor envia diretamente a 'answer' crua
  socket.on('answer', async (answer) => {
    log('Answer recebida', 'info');
    try {
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
    } catch (err) {
      log(`Erro ao aplicar Answer: ${err.message}`, 'error');
    }
  });

  // CORREÇÃO: O servidor envia diretamente o 'candidate' cru
  socket.on('candidate', async (candidate) => {
    if (pc && candidate) {
      try {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
        log('ICE candidate adicionado', '');
      } catch (err) {
        log(`Erro ao adicionar ICE: ${err.message}`, 'error');
      }
    }
  });

  socket.on('disconnect', () => {
    setDot('ws', 'red');
    setDot('room', 'red');
    log('Socket desconectado', 'error');

    $('btn-connect').disabled = false;
    $('btn-camera').disabled  = true;
    $('btn-call').disabled    = true;
  });

  socket.on('connect_error', () => {
    log('Erro de conexão no Socket.IO', 'error');
    setDot('ws', 'red');
  });
}

/* ── PeerConnection ── */
async function ensurePeerConnection() {
  if (pc) return;
  pc = new RTCPeerConnection(iceConfig);
  setDot('peer', 'yellow');
  log('PeerConnection criada', 'info');

  if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) send('candidate', { candidate, room: currentRoom });
  };

  pc.ontrack = ({ streams }) => {
    $('remote-video').srcObject = streams[0];
    $('ph-remote').style.display = 'none';
    setDot('peer', 'green');
    log('Stream remoto recebido 🎉', 'success');
  };

  pc.onconnectionstatechange = () => {
    log(`Peer state: ${pc.connectionState}`);
    if (pc.connectionState === 'connected') {
      setDot('peer', 'green');
    }
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      setDot('peer', 'red');
    }
  };
}

/* ── Câmera ── */
async function startCamera() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    $('local-video').srcObject = localStream;
    $('ph-local').style.display = 'none';
    log('Câmera e microfone ativos', 'success');
    $('btn-call').disabled   = false;
    $('btn-camera').disabled = true;
    $('btn-hangup').disabled = false;
  } catch (e) {
    log(`Câmera negada: ${e.message}`, 'error');
  }
}

/* ── Ligar ── */
async function call() {
  await ensurePeerConnection();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  send('offer', { offer, room: currentRoom });
  log('Offer enviada — aguardando resposta…', 'info');
  $('btn-call').disabled = true;
}

/* ── Desligar ── */
function hangup() {
  if (pc)          { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  $('local-video').srcObject  = null;
  $('remote-video').srcObject = null;
  $('ph-local').style.display  = '';
  $('ph-remote').style.display = '';
  setDot('peer', '');
  $('btn-hangup').disabled = true;
  $('btn-call').disabled   = true;
  $('btn-camera').disabled = false;
  log('Chamada encerrada', 'warn');
}

/* ── Bindings ── */
$('btn-connect').addEventListener('click', connect);
$('btn-camera') .addEventListener('click', startCamera);
$('btn-call')   .addEventListener('click', call);
$('btn-hangup') .addEventListener('click', hangup);

log('Pronto. Configure o servidor e clique em Conectar.', 'info');
</script>
</body>
</html>
