<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC · Video </title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="shell">

  <header>
    <div class="logo">📡</div>
    <div>
      <h1>WebRTC · Socket.IO Signaling</h1>
      <p>Node.js Socket.IO backend &nbsp;·&nbsp; Socket.IO frontend</p>
    </div>
  </header>

  <div class="card">
    <div class="card-title">Status</div>
    <div class="status-row">
      <div class="badge"><span class="dot" id="dot-ws"></span> Socket.IO</div>
      <div class="badge"><span class="dot" id="dot-room"></span> Sala</div>
      <div class="badge"><span class="dot" id="dot-peer"></span> Peer</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Conexão</div>
    <div class="controls">
      <div>
        <label>Servidor Socket.IO</label>
        <input id="srv" value="http://localhost:3000" />
      </div>
      <div>
        <label>Sala</label>
        <input id="room" value="sala-01" />
      </div>
      <button class="btn btn-primary" id="btn-connect">Conectar</button>
    </div>
    <div class="actions" style="margin-top:.9rem">
      <button class="btn btn-neutral" id="btn-camera"   disabled>📷 Câmera</button>
      <button class="btn btn-primary" id="btn-call"     disabled>📞 Ligar</button>
      <button class="btn btn-danger"  id="btn-hangup"   disabled>🔴 Desligar</button>
    </div>
  </div>

  <div class="videos">
    <div class="video-wrap">
      <div class="video-placeholder" id="ph-local">🎥</div>
      <video id="local-video" autoplay muted playsinline></video>
      <div class="video-label">Você</div>
    </div>
    <div class="video-wrap">
      <div class="video-placeholder" id="ph-remote">👤</div>
      <video id="remote-video" autoplay playsinline></video>
      <div class="video-label">Remoto</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Log</div>
    <div class="log" id="log"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
