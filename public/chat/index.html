<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>WebRTC · Chat P2P</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="shell">

  <header>
    <div class="logo">💬</div>
    <div>
      <h1>WebRTC · Chat Peer-to-Peer</h1>
      <p>Node.js Socket.IO backend &nbsp;·&nbsp; WebRTC DataChannel frontend</p>
    </div>
  </header>

  <div class="card">
    <div class="card-title">Status</div>
    <div class="status-row">
      <div class="badge"><span class="dot" id="dot-ws"></span> Socket.IO</div>
      <div class="badge"><span class="dot" id="dot-room"></span> Sala</div>
      <div class="badge"><span class="dot" id="dot-peer"></span> Peer</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Conexão</div>
    <div class="controls" style="grid-template-columns: 1fr 1fr 1fr auto;">
      <div>
        <label>Servidor Socket.IO</label>
        <input id="srv" value="http://localhost:3000" />
      </div>
      <div>
        <label>Seu Nome</label>
        <input id="username" value="Usuário Anônimo" placeholder="Ex: João" />
      </div>
      <div>
        <label>Sala / Grupo</label>
        <input id="room" value="sala-01" />
      </div>
      <button class="btn btn-primary" id="btn-connect">Conectar</button>
    </div>
  </div>

  <section class="card">
    <div class="card-title"><span>Mensagens</span></div>
    <div id="messageContainer" class="message-container">
      </div>
  </section>

  <section class="card">
    <div class="card-title"><span>Enviar mensagem</span></div>
    <div class="controls" style="grid-template-columns: 1fr auto;">
      <div class="message-input-container">
        <label>Mensagem</label>
        <div class="message-input">
          <div class="btn btn-secondary" id="btn-attach" style="cursor:pointer; display:flex; align-items:center; justify-content:center; width:40px;">
            📎
            <input id="fileInput" type="file" accept="image/*,video/*,audio/*,application/pdf" multiple style="display:none;" disabled />
          </div>
          <input id="messageInput" type="text" placeholder="Digite sua mensagem..." disabled />
          <button class="btn btn-primary" id="btn-send" disabled>Enviar</button>
        </div>
      </div>
    </div>
    <p class="hint">Conecte-se a uma sala para começar a conversar.</p>
  </section>

  <div class="card">
    <div class="card-title">Log do Sistema</div>
    <div class="log" id="log"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
