<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>WebRTC + Socket.IO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📁 Transferência P2P (Socket.IO)</h2>

<input type="text" id="room" placeholder="Sala">
<button onclick="connect()">Conectar</button>

<br><br>

<input type="file" id="fileInput">
<button onclick="sendFile()">Enviar</button>

<br><br>

<div id="acceptContainer" style="display: none; border: 2px solid #4CAF50; padding: 15px; border-radius: 8px; margin: 10px 0;">
  <p>📥 Recebimento aguardando:</p>
  <p><strong>Arquivo:</strong> <span id="transferFileName"></span></p>
  <p><strong>Tamanho:</strong> <span id="transferFileSize"></span></p>
  <button id="acceptBtn" style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">Aceitar e Salvar</button>
</div>

<br>

<button onclick="download()">Baixar</button>

<p id="status"></p>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
